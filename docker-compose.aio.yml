services:
  api:
    image: ghcr.io/nogringo/nmail-api:main
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://nmail:${POSTGRES_PASSWORD:-nmail}@postgres:5432/nmail
      PROTECTED_EMAIL_DOMAINS: ${PROTECTED_EMAIL_DOMAINS:-nmail.li}
      INBOUND_DECISION_TOKEN: ${INBOUND_DECISION_TOKEN:?Set INBOUND_DECISION_TOKEN}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nmail
      POSTGRES_USER: nmail
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nmail}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nmail -d nmail"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - nmail-api-postgres:/var/lib/postgresql

volumes:
  nmail-api-postgres:
